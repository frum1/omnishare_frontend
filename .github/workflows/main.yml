name: Build and Release Frontend

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Archive dist
        run: tar -czf frontend-dist-${{ github.ref_name }}.tar.gz -C dist .

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: frontend-dist-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
